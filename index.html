}

    padding: 12px 30px;
    border: 3px solid #000;
    font-size: 22px;
}

.node {
    fill: #fff8dc;
    stroke: #caa54c;
    stroke-width: 2;
}

.label {
    font-size: 16px;
    font-weight: bold;
    text-anchor: middle;
}

.link {
    stroke: #000;
    stroke-width: 2;
