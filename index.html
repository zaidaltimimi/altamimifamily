<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>شجرة عائلة ذكية</title>

<style>
body { font-family: Tahoma; display:flex; margin:0; background:#f4f1e6; }
.sidebar { width:300px; background:#fff; padding:20px; border-left:2px solid #ddd; }
input, textarea, button { width:100%; padding:10px; margin-bottom:10px; }
button { background:#2c3e50; color:white; border:none; cursor:pointer; }

#tree-container { flex:1; overflow:auto; padding:20px; }

.tree ul { padding-top:20px; position:relative; }
.tree li { display:inline-block; text-align:center; list-style:none; position:relative; padding:20px 5px 0 5px; }

.tree li::before, .tree li::after {
    content:''; position:absolute; top:0; right:50%;
    border-top:2px solid #777; width:50%; height:20px;
}
.tree li::after { left:50%; border-left:2px solid #777; }

.tree li:only-child::before, .tree li:only-child::after { display:none; }
.tree li:first-child::before, .tree li:last-child::after { border:none; }
.tree li:last-child::before { border-right:2px solid #777; }

.tree ul ul::before {
    content:''; position:absolute; top:0; right:50%;
    border-right:2px solid #777; height:20px;
}

.node {
    border:2px solid #caa54c;
    background:#fff8dc;
    padding:6px 12px;
    border-radius:5px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="sidebar">
    <h3>🌳 نظام ذكي</h3>

    <input id="name" placeholder="اسم الشخص">
    <button onclick="smartAdd()">إضافة ذكية</button>

    <hr>

    <textarea id="bulk" placeholder="مثال:
زيد ابن علي
علي ابن حسن"></textarea>
    <button onclick="parseText()">إدخال من نص</button>

    <button onclick="resetTree()">حذف الكل</button>
</div>

<div id="tree-container">
    <div class="tree" id="tree"></div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("tree")) || [];

function save() {
    localStorage.setItem("tree", JSON.stringify(data));
    render();
}

// 🔥 منع التكرار
function exists(name) {
    return data.find(p => p.name === name);
}

// 🔥 إضافة ذكية
function smartAdd() {
    let name = document.getElementById("name").value.trim();

    if (!name) return alert("ادخل اسم");

    if (exists(name)) return alert("⚠️ الاسم موجود مسبقاً");

    // أول شخص = جد
    if (data.length === 0) {
        data.push({ id:"root", name, parent:null });
        save();
        return;
    }

    let parentName = prompt("منو الأب؟");

    if (!parentName) return;

    let parent = data.find(p => p.name === parentName);

    if (!parent) {
        if (confirm("الأب غير موجود، تريد إضافته؟")) {
            let parentId = "id_" + Date.now();
            data.push({ id: parentId, name: parentName, parent:"root" });

            data.push({
                id: "id_" + (Date.now()+1),
                name,
                parent: parentId
            });

            save();
        }
        return;
    }

    data.push({
        id: "id_" + Date.now(),
        name,
        parent: parent.id
    });

    document.getElementById("name").value = "";
    save();
}

// 🔥 تحويل النص إلى شجرة
function parseText() {
    let text = document.getElementById("bulk").value.trim();
    if (!text) return;

    let lines = text.split("\n");

    lines.forEach(line => {
        let parts = line.split("ابن");

        if (parts.length !== 2) return;

        let child = parts[0].trim();
        let parent = parts[1].trim();

        // أضف الأب إذا غير موجود
        if (!exists(parent)) {
            data.push({
                id: "id_" + Date.now() + Math.random(),
                name: parent,
                parent: null
            });
        }

        let parentObj = data.find(p => p.name === parent);

        // أضف الابن
        if (!exists(child)) {
            data.push({
                id: "id_" + Date.now() + Math.random(),
                name: child,
                parent: parentObj.id
            });
        }
    });

    save();
}

// 🔥 بناء الشجرة
function buildTree(parentId) {
    let children = data.filter(d => d.parent === parentId);
    if (!children.length) return "";

    let html = "<ul>";

    children.forEach(c => {
        html += `
        <li>
            <div class="node">${c.name}</div>
            ${buildTree(c.id)}
        </li>`;
    });

    html += "</ul>";
    return html;
}

// 🔥 رسم
function render() {
    if (!data.length) return;

    let root = data.find(d => d.parent === null);

    document.getElementById("tree").innerHTML = `
    <ul>
        <li>
            <div class="node">${root.name}</div>
            ${buildTree(root.id)}
        </li>
    </ul>`;
}

// 🔥 حذف
function resetTree() {
    if (confirm("حذف الكل؟")) {
        data = [];
        save();
    }
}

window.onload = render;

</script>

</body>
</html>
